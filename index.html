<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>RTS Mobile Test</title>
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <!-- Top button row -->
  <div id="topbar" class="bar">
    <button class="btn" id="btn-recenter" aria-label="Center camera">&#9678;</button>
    <button class="btn" id="btn-zoom-in">+</button>
    <button class="btn" id="btn-zoom-out">&minus;</button>
    <div class="spacer"></div>
    <button class="btn" id="btn-map" aria-haspopup="dialog">Map</button>
    <button class="btn" id="btn-macro" aria-pressed="true">Macro</button>
    <button class="btn" id="btn-hex" aria-pressed="false">Hex</button>
    <div class="readout ore" id="ore">&#9670; 0</div>
    <div class="readout" id="readout">&nbsp;</div>
  </div>

  <!-- Group buttons: tap to select, tap again to center the camera.
       1/2/3 are assignable: press-and-hold saves the current selection. -->
  <div id="groupbar" class="bar">
    <button class="btn sm" data-group="mains">HQ</button>
    <button class="btn sm" data-group="production">Prod</button>
    <button class="btn sm" data-group="upgrades">Lab</button>
    <button class="btn sm" data-group="idle">Idle</button>
    <button class="btn sm" data-group="army">Army</button>
    <button class="btn sm" data-group="g1">1</button>
    <button class="btn sm" data-group="g2">2</button>
    <button class="btn sm" data-group="g3">3</button>
  </div>

  <!-- Game viewport -->
  <svg id="view" xmlns="http://www.w3.org/2000/svg">
    <g id="world">
      <g id="layer-grid"></g>
      <g id="layer-entities"></g>
      <g id="layer-overlay"></g>
    </g>
  </svg>

  <!-- Bottom button row: #actions is filled dynamically from the selection
       (train buttons for buildings, build/stop buttons for units). -->
  <div id="bottombar" class="bar">
    <div id="actions" class="actions"></div>
    <div class="readout grow" id="selinfo"></div>
    <button class="btn" id="btn-deselect">&#10005;</button>
  </div>

  <!-- Map menu: read the current seed, type a new one, or roll a fresh map.
       Applying reloads with ?seed=<value>, which the generator reads on init. -->
  <div id="mapmenu" class="popup hidden" role="dialog" aria-label="Map settings">
    <div class="popup-panel">
      <div class="popup-title">Map</div>
      <div class="popup-current" id="seed-current">Seed: &mdash;</div>
      <label class="popup-field">Seed
        <input id="seed-input" class="popup-input" type="text" inputmode="numeric"
               autocomplete="off" placeholder="number or “none”" />
      </label>
      <div class="popup-actions">
        <button class="btn" id="btn-seed-random">New map</button>
        <button class="btn" id="btn-seed-apply">Apply</button>
      </div>
      <button class="btn popup-close" id="btn-seed-close">Close</button>
    </div>
  </div>

  <!-- Classic scripts (no build step, works over file://).
       ORDER MATTERS: config first, then model layers (camera/map/hex/path/
       types/entities/selection/sim), then view/ui (render/view/actions/
       input), then game.js which wires everything. Keep tests/unit/run.js's
       file list in sync when adding a module.
       ?v=N is a cache buster: BUMP IT (all lines, same number) whenever any
       js/css file changes, or phones mix stale cached scripts with a fresh
       index.html and the game breaks at startup. -->
  <script src="js/config.js?v=7"></script>
  <script src="js/rng.js?v=7"></script>
  <script src="js/camera.js?v=7"></script>
  <script src="js/map.js?v=7"></script>
  <script src="js/hex.js?v=7"></script>
  <script src="js/path.js?v=7"></script>
  <script src="js/mapgen.js?v=7"></script>
  <script src="js/types.js?v=7"></script>
  <script src="js/entities.js?v=7"></script>
  <script src="js/selection.js?v=7"></script>
  <script src="js/sim.js?v=7"></script>
  <script src="js/ai.js?v=7"></script>
  <script src="js/render.js?v=7"></script>
  <script src="js/view.js?v=7"></script>
  <script src="js/actions.js?v=7"></script>
  <script src="js/input.js?v=7"></script>
  <script src="js/game.js?v=7"></script>
</body>
</html>
